model:
  name: "Qwen/Qwen3-VL-2B-Instruct"
  dtype: "bfloat16"
  device_map: "auto"

data:
  # Directory containing the HD-EPIC vqa-benchmark/*.json files
data:
  vqa_benchmark_dir: "/scratch/izar/kopidaki/hd-epic/hd-epic-annotations/vqa-benchmark"
  video_clips_dir: "/scratch/izar/kopidaki/hd-epic/HD-EPIC/Videos"
  candidate_fps: 1
  min_clip_duration_s: 384   # exclude clips <6.4 mins
  max_clip_duration_s: 3600  # up to 1h; questions with no clip window always kept

tools:
  frame_budget: 8
  clip_model: "ViT-SO400M-14-SigLIP"
  clip_pretrained: "webli"

eval:
  results_dir: "/scratch/izar/kopidaki/hd-epic/results/"
